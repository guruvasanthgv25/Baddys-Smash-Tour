<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Baddys Smash Tour</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111318;--bg2:#1a1d24;--bg3:#22262f;--bg4:#2a2e38;
  --text:#f0eff8;--text2:#a0a0b0;--text3:#606070;
  --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.15);
  --green:#1D9E75;--green-bg:rgba(29,158,117,0.15);--green-light:#5DCAA5;
  --amber:#EF9F27;--amber-bg:rgba(239,159,39,0.15);
  --red:#E05050;--red-bg:rgba(224,80,80,0.12);
  --blue:#378ADD;--blue-bg:rgba(55,138,221,0.13);
  --purple:#7F77DD;--purple-bg:rgba(127,119,221,0.13);
  --gold:#F0C040;--silver:#A8B0C0;--bronze:#C8845A;
  --radius:8px;--radius-lg:14px;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;position:relative;overflow-x:hidden}

/* Stadium background */
body::before{
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 20%, rgba(29,158,117,0.07) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 80%, rgba(55,138,221,0.05) 0%, transparent 50%),
    linear-gradient(160deg, #0d1017 0%, #111520 40%, #0f1a14 100%);
}
/* Court lines effect */
body::after{
  content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  width:700px;height:380px;z-index:0;
  border:1px solid rgba(255,255,255,0.03);
  border-radius:4px;
  box-shadow:
    0 0 0 40px rgba(255,255,255,0.015),
    0 0 0 80px rgba(255,255,255,0.01),
    inset 0 0 0 1px rgba(255,255,255,0.02);
  pointer-events:none;
}

.wrap{position:relative;z-index:1;min-height:100vh}

/* Top bar */
.topbar{
  background:rgba(17,19,24,0.85);
  backdrop-filter:blur(12px);
  border-bottom:0.5px solid var(--border);
  padding:0 24px;
  display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:8px;
  position:sticky;top:0;z-index:100;
  height:56px;
}
.logo{display:flex;align-items:center;gap:10px}
.logo i{font-size:22px;color:var(--green-light)}
.logo-text{font-size:16px;font-weight:600;letter-spacing:0.3px;
  background:linear-gradient(90deg,#5DCAA5,#378ADD);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.nav-tabs{display:flex;gap:2px}
.nav-tabs button{
  background:transparent;border:none;padding:8px 14px;border-radius:var(--radius);
  font-size:13px;color:var(--text2);cursor:pointer;transition:all 0.15s;
  display:flex;align-items:center;gap:5px;white-space:nowrap;
}
.nav-tabs button.active{background:rgba(255,255,255,0.07);color:var(--text);font-weight:500}
.nav-tabs button:hover:not(.active){background:rgba(255,255,255,0.04);color:var(--text)}

.content{max-width:960px;margin:0 auto;padding:28px 16px}

/* Cards */
.card{
  background:rgba(26,29,36,0.9);
  border:0.5px solid var(--border);
  border-radius:var(--radius-lg);
  padding:18px;margin-bottom:14px;
  backdrop-filter:blur(4px);
}
.card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-head h3{font-size:14px;font-weight:500;color:var(--text2)}

/* Metrics */
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:22px}
@media(max-width:540px){.grid4{grid-template-columns:repeat(2,1fr)}}
.metric{background:rgba(255,255,255,0.04);border:0.5px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.metric .val{font-size:26px;font-weight:600}
.metric .lbl{font-size:11px;color:var(--text3);margin-top:4px;text-transform:uppercase;letter-spacing:0.5px}

/* Buttons */
.btn{
  background:rgba(255,255,255,0.06);border:0.5px solid var(--border2);
  border-radius:var(--radius);padding:7px 14px;font-size:13px;cursor:pointer;
  color:var(--text);display:inline-flex;align-items:center;gap:6px;
  transition:all 0.15s;white-space:nowrap;
}
.btn:hover{background:rgba(255,255,255,0.1)}
.btn.primary{background:var(--green);border-color:var(--green);color:#fff}
.btn.primary:hover{background:#17876300;background:rgba(29,158,117,0.85)}
.btn.danger{background:transparent;border-color:rgba(224,80,80,0.4);color:var(--red)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.gold{background:rgba(240,192,64,0.15);border-color:rgba(240,192,64,0.3);color:var(--gold)}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge.green{background:var(--green-bg);color:var(--green-light)}
.badge.amber{background:var(--amber-bg);color:var(--amber)}
.badge.red{background:var(--red-bg);color:var(--red)}
.badge.blue{background:var(--blue-bg);color:var(--blue)}
.badge.purple{background:var(--purple-bg);color:var(--purple)}
.badge.gray{background:rgba(255,255,255,0.06);color:var(--text2)}

/* Tables */
table{width:100%;border-collapse:collapse;font-size:13px;table-layout:fixed}
th{text-align:left;padding:9px 10px;color:var(--text3);font-weight:500;font-size:11px;
   border-bottom:0.5px solid var(--border);text-transform:uppercase;letter-spacing:0.4px}
td{padding:9px 10px;border-bottom:0.5px solid var(--border);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,0.02)}

.score-input{
  width:44px;border:0.5px solid var(--border2);border-radius:var(--radius);
  padding:5px 6px;font-size:13px;text-align:center;
  background:rgba(255,255,255,0.06);color:var(--text);
}
.score-input:focus{outline:none;border-color:var(--green-light)}

/* Section head */
.sec{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.sec h2{font-size:15px;font-weight:600;color:var(--text)}

/* Team row */
.team-row{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:0.5px solid var(--border)}
.team-row:last-child{border-bottom:none}

/* Standings pos */
.sp{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;flex-shrink:0}
.sp1{background:rgba(240,192,64,0.2);color:var(--gold)}
.sp2{background:rgba(168,176,192,0.2);color:var(--silver)}
.sp3{background:rgba(200,132,90,0.2);color:var(--bronze)}
.spn{background:rgba(255,255,255,0.05);color:var(--text3)}

.win{color:var(--green-light);font-weight:500}
.lose{color:var(--text2)}

/* Modal */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);
  display:flex;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(4px)}
.modal{background:#1a1d24;border-radius:var(--radius-lg);border:0.5px solid var(--border2);
  padding:24px;width:380px;max-width:92vw}
.modal h3{font-size:15px;font-weight:600;margin-bottom:18px;color:var(--text)}
.form-row{margin-bottom:14px}
.form-row label{display:block;font-size:12px;color:var(--text2);margin-bottom:5px}
.form-row input,.form-row textarea{
  width:100%;border:0.5px solid var(--border2);border-radius:var(--radius);
  padding:8px 10px;font-size:13px;background:rgba(255,255,255,0.05);color:var(--text);
}
.form-row input:focus,.form-row textarea:focus{outline:none;border-color:var(--green-light)}
.form-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;
  background:var(--green-bg);color:var(--green-light);
  border:0.5px solid var(--green);border-radius:var(--radius);
  padding:8px 16px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:400}
.toast.show{opacity:1}

/* Knockout bracket */
.bracket{overflow-x:auto;padding-bottom:12px}
.bracket-grid{display:flex;gap:0;min-width:600px}
.bracket-round{display:flex;flex-direction:column;flex:1;min-width:140px}
.bracket-round-title{text-align:center;font-size:11px;font-weight:600;color:var(--text3);
  text-transform:uppercase;letter-spacing:0.5px;padding:8px;margin-bottom:8px;
  border-bottom:0.5px solid var(--border)}
.bracket-slots{display:flex;flex-direction:column;justify-content:space-around;flex:1;gap:8px;padding:0 6px}
.bracket-match{background:rgba(255,255,255,0.04);border:0.5px solid var(--border);
  border-radius:var(--radius);overflow:hidden;position:relative}
.bracket-match.has-winner{border-color:rgba(29,158,117,0.3)}
.bracket-team{display:flex;align-items:center;justify-content:space-between;
  padding:7px 9px;font-size:12px;gap:6px}
.bracket-team+.bracket-team{border-top:0.5px solid var(--border)}
.bracket-team.winner{background:rgba(29,158,117,0.12);color:var(--green-light);font-weight:500}
.bracket-team.loser{color:var(--text3)}
.bracket-team.tbd{color:var(--text3);font-style:italic}
.bracket-score{font-size:12px;font-weight:600;min-width:18px;text-align:right}
.bracket-connector{width:16px;flex-shrink:0;position:relative}

/* Poll */
.poll-option{background:rgba(255,255,255,0.04);border:0.5px solid var(--border);
  border-radius:var(--radius);padding:12px 14px;margin-bottom:8px;cursor:pointer;
  transition:all 0.15s;position:relative;overflow:hidden}
.poll-option:hover{border-color:var(--border2)}
.poll-option.voted{border-color:rgba(29,158,117,0.4)}
.poll-bar{position:absolute;left:0;top:0;bottom:0;background:rgba(29,158,117,0.1);transition:width 0.4s}
.poll-label{position:relative;z-index:1;display:flex;justify-content:space-between;align-items:center;font-size:13px}
.poll-pct{font-size:12px;color:var(--green-light);font-weight:500}

.empty{text-align:center;padding:50px 20px;color:var(--text3);font-size:13px}
.divider{height:0.5px;background:var(--border);margin:16px 0}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <div class="logo">
    <i class="ti ti-feather"></i>
    <span class="logo-text">Baddys Smash Tour</span>
  </div>
  <div class="nav-tabs" id="nav-tabs">
    <button class="active" onclick="showTab('teams',this)"><i class="ti ti-users"></i> Teams</button>
    <button onclick="showTab('poll',this)"><i class="ti ti-chart-bar"></i> Poll</button>
    <button onclick="showTab('schedule',this)"><i class="ti ti-calendar"></i> League</button>
    <button onclick="showTab('scores',this)"><i class="ti ti-ball-tennis"></i> Scores</button>
    <button onclick="showTab('standings',this)"><i class="ti ti-list-numbers"></i> Standings</button>
    <button onclick="showTab('knockout',this)"><i class="ti ti-tournament"></i> Knockout</button>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <span class="badge green" id="save-badge"><i class="ti ti-device-floppy"></i> Saved</span>
    <button class="btn sm danger" onclick="doReset()"><i class="ti ti-trash"></i> Reset</button>
  </div>
</div>

<div class="content">
  <div id="tab-content" style="min-height:400px"></div>
</div>

</div>

<div id="modal-area"></div>
<div class="toast" id="toast"><i class="ti ti-check"></i> Saved</div>

<script>
const STORE_KEY='baddys_smash_tour_v1';

const defaultTeams=[
  {id:1,name:'Shuttle Hawks',p1:'Arjun Kumar',p2:'Vikram Nair'},
  {id:2,name:'Smash Bros',p1:'Ravi Shankar',p2:'Deepak Raj'},
  {id:3,name:'Net Crushers',p1:'Suresh Pillai',p2:'Anil Menon'},
  {id:4,name:'Drop Shot Kings',p1:'Priya Mehta',p2:'Sneha Iyer'},
];

function freshState(){
  return{
    tab:'teams',
    teams:defaultTeams.map(t=>({...t})),
    matches:[],
    nextTeamId:5,generated:false,
    knockout:{rounds:[],generated:false},
    polls:[
      {id:1,question:'Who will win the tournament?',options:[
        {id:1,text:'Shuttle Hawks',votes:3},
        {id:2,text:'Smash Bros',votes:5},
        {id:3,text:'Net Crushers',votes:2},
        {id:4,text:'Drop Shot Kings',votes:4},
      ],votedFor:null,createdAt:Date.now()}
    ],
    nextPollId:2,nextOptionId:10,
  };
}

function loadState(){
  try{const r=localStorage.getItem(STORE_KEY);if(r)return JSON.parse(r);}catch(e){}
  return freshState();
}

let state=loadState();

function saveState(){
  try{localStorage.setItem(STORE_KEY,JSON.stringify(state));showToast();}catch(e){}
}
function showToast(){
  const t=document.getElementById('toast');if(!t)return;
  t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);
}
function getTeam(id){return state.teams.find(t=>t.id===id)}

/* ── Round robin schedule ── */
function generateLeague(){
  const teams=state.teams,n=teams.length;
  state.matches=[];
  let mid=1;const all=[...teams];
  const totalRounds=n%2===0?n-1:n,perRound=Math.floor(n/2);
  for(let r=0;r<totalRounds;r++){
    for(let m=0;m<perRound;m++)
      state.matches.push({id:mid++,round:r+1,t1:all[m].id,t2:all[n-1-m].id,s1:'',s2:'',done:false});
    const rot=all.slice(1);rot.unshift(rot.pop());all.splice(1,rot.length,...rot);
  }
  state.generated=true;
  state.knockout={rounds:[],generated:false};
}

/* ── Standings ── */
function computeStandings(){
  const map={};
  state.teams.forEach(t=>{map[t.id]={id:t.id,w:0,l:0,d:0,pts:0,sf:0,sa:0,mp:0}});
  state.matches.filter(m=>m.done).forEach(m=>{
    const s1=parseInt(m.s1)||0,s2=parseInt(m.s2)||0;
    map[m.t1].mp++;map[m.t2].mp++;
    map[m.t1].sf+=s1;map[m.t1].sa+=s2;
    map[m.t2].sf+=s2;map[m.t2].sa+=s1;
    if(s1>s2){map[m.t1].w++;map[m.t1].pts+=2;map[m.t2].l++;}
    else if(s2>s1){map[m.t2].w++;map[m.t2].pts+=2;map[m.t1].l++;}
    else{map[m.t1].d++;map[m.t1].pts++;map[m.t2].d++;map[m.t2].pts++;}
  });
  return Object.values(map).sort((a,b)=>b.pts-a.pts||b.w-a.w||(b.sf-b.sa)-(a.sf-a.sa));
}

/* ── Knockout logic ── */
function knockoutQualifiers(){
  const n=state.teams.length;
  // how many qualify: nearest power of 2 <= n, max 8
  const sizes=[2,4,8,16];
  let q=2;
  for(const s of sizes){if(s<=n)q=s;}
  return Math.min(q,n);
}

function roundName(totalRounds,roundIdx){
  // roundIdx 0 = first round, totalRounds-1 = final
  const fromEnd=totalRounds-1-roundIdx;
  if(fromEnd===0)return'Final';
  if(fromEnd===1)return'Semi-final';
  if(fromEnd===2)return'Quarter-final';
  if(fromEnd===3)return'Pre-quarter';
  return`Round of ${Math.pow(2,fromEnd+1)}`;
}

function generateKnockout(){
  const q=knockoutQualifiers();
  const standings=computeStandings();
  const qualified=standings.slice(0,q);

  // seed: 1 vs q, 2 vs q-1, etc.
  const seeds=qualified.map((s,i)=>s.id);
  const totalRounds=Math.log2(q);
  const rounds=[];

  // First round matches
  const firstMatches=[];
  for(let i=0;i<q/2;i++){
    firstMatches.push({
      id:`ko_${Date.now()}_${i}`,
      t1:seeds[i],t2:seeds[q-1-i],
      s1:'',s2:'',done:false,winner:null
    });
  }
  rounds.push({name:roundName(totalRounds,0),matches:firstMatches});

  // Placeholder rounds
  for(let r=1;r<totalRounds;r++){
    const prevCount=rounds[r-1].matches.length;
    const matches=[];
    for(let i=0;i<prevCount/2;i++){
      matches.push({id:`ko_r${r}_${i}`,t1:null,t2:null,s1:'',s2:'',done:false,winner:null});
    }
    rounds.push({name:roundName(totalRounds,r),matches});
  }

  state.knockout={rounds,generated:true,qualifierCount:q};
}

function propagateKnockout(roundIdx,matchIdx){
  const rounds=state.knockout.rounds;
  const match=rounds[roundIdx].matches[matchIdx];
  if(!match.done)return;
  const nextRoundIdx=roundIdx+1;
  if(nextRoundIdx>=rounds.length)return;
  const nextMatchIdx=Math.floor(matchIdx/2);
  const slot=matchIdx%2===0?'t1':'t2';
  rounds[nextRoundIdx].matches[nextMatchIdx][slot]=match.winner;
}

/* ──────────────── RENDER FUNCTIONS ──────────────── */

function renderTeams(){
  const played=state.matches.filter(m=>m.done).length;
  return`
  <div class="grid4">
    <div class="metric"><div class="val">${state.teams.length}</div><div class="lbl">Teams</div></div>
    <div class="metric"><div class="val">${state.teams.length*2}</div><div class="lbl">Players</div></div>
    <div class="metric"><div class="val">${state.matches.length}</div><div class="lbl">Matches</div></div>
    <div class="metric"><div class="val">${played}</div><div class="lbl">Completed</div></div>
  </div>
  <div class="sec">
    <h2>Registered teams</h2>
    <button class="btn primary" onclick="openAddTeam()"><i class="ti ti-plus"></i> Add team</button>
  </div>
  <div class="card">
    ${state.teams.length===0?`<div class="empty">No teams yet.</div>`:
    state.teams.map(t=>`
    <div class="team-row">
      <div>
        <div style="font-size:13px;font-weight:500">${t.name}</div>
        <div style="font-size:12px;color:var(--text2);margin-top:3px">
          <i class="ti ti-user" style="font-size:12px"></i> ${t.p1} &amp; ${t.p2}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px">
        <span class="badge green">Active</span>
        <button class="btn danger sm" onclick="removeTeam(${t.id})"><i class="ti ti-trash"></i></button>
      </div>
    </div>`).join('')}
  </div>
  ${!state.generated&&state.teams.length>=2?`
    <div style="text-align:center;margin-top:12px">
      <button class="btn primary" onclick="doGenerateLeague()">
        <i class="ti ti-refresh"></i> Generate round-robin schedule
      </button>
    </div>`:``}
  ${state.generated?`<div style="text-align:center;margin-top:10px">
    <span class="badge green"><i class="ti ti-check"></i> Schedule active — ${state.matches.length} matches, ${knockoutQualifiers()} teams will qualify for knockout</span>
  </div>`:''}`;
}

function renderPoll(){
  const polls=state.polls;
  const n=state.teams.length;
  const groupSize=4;
  const groupCount=n>=4?Math.ceil(n/groupSize):0;
  const alreadyGenerated=polls.length>0&&polls[0].autoGroup;
  return`
  <div class="sec">
    <h2>Fan polls</h2>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${n<4?`<span class="badge gray" style="align-self:center">Need at least 4 teams to generate polls</span>`:`
      <button class="btn primary" onclick="generateGroupPolls()">
        <i class="ti ti-refresh"></i> ${alreadyGenerated?'Regenerate':'Generate'} polls (${groupCount} groups of ${groupSize})
      </button>`}
      <button class="btn" onclick="deleteAllPolls()" style="${polls.length===0?'opacity:0.4;pointer-events:none':''}">
        <i class="ti ti-trash"></i> Clear all
      </button>
    </div>
  </div>

  ${n>=4&&!alreadyGenerated&&polls.length===0?`
  <div class="card" style="text-align:center;padding:32px 20px;border-style:dashed">
    <i class="ti ti-chart-bar" style="font-size:32px;color:var(--text3);display:block;margin-bottom:12px"></i>
    <div style="font-size:14px;font-weight:500;margin-bottom:6px">Generate polls from your ${n} teams</div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px">
      Splits teams into ${groupCount} polls of 4 — fans vote on who they think will win each group.
    </div>
    <button class="btn primary" onclick="generateGroupPolls()">
      <i class="ti ti-bolt"></i> Generate ${groupCount} polls now
    </button>
  </div>`:''}

  ${polls.length===0&&n<4?`<div class="empty">Add at least 4 teams to generate polls.</div>`:''}

  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:14px">
  ${polls.map(poll=>{
    const total=poll.options.reduce((s,o)=>s+o.votes,0)||1;
    const topOpt=poll.options.reduce((a,b)=>b.votes>a.votes?b:a,poll.options[0]);
    return`
    <div class="card" style="margin-bottom:0">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:12px">
        <div>
          <div style="font-size:13px;font-weight:600">${poll.question}</div>
          <div style="font-size:11px;color:var(--text3);margin-top:3px">
            ${poll.options.reduce((s,o)=>s+o.votes,0)} votes
          </div>
        </div>
        <button class="btn danger sm" onclick="deletePoll(${poll.id})" style="flex-shrink:0"><i class="ti ti-x"></i></button>
      </div>
      ${poll.options.map(opt=>{
        const pct=Math.round(opt.votes/total*100);
        const isVoted=poll.votedFor===opt.id;
        const isLeading=opt.id===topOpt.id&&topOpt.votes>0;
        return`<div class="poll-option${isVoted?' voted':''}" onclick="castVote(${poll.id},${opt.id})" style="margin-bottom:6px">
          <div class="poll-bar" style="width:${pct}%;background:${isLeading?'rgba(29,158,117,0.18)':'rgba(55,138,221,0.1)'}"></div>
          <div class="poll-label">
            <span style="display:flex;align-items:center;gap:5px;overflow:hidden">
              ${isLeading?`<i class="ti ti-crown" style="font-size:11px;color:var(--amber);flex-shrink:0"></i>`:''}
              ${isVoted?`<i class="ti ti-check" style="font-size:11px;color:var(--green-light);flex-shrink:0"></i>`:''}
              <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${opt.text}</span>
            </span>
            <span class="poll-pct" style="flex-shrink:0;margin-left:6px">${pct}%</span>
          </div>
        </div>`;
      }).join('')}
      <div style="font-size:11px;color:var(--text3);margin-top:8px;text-align:right">
        ${poll.votedFor?`<i class="ti ti-check"></i> Voted`:`Tap to vote`}
      </div>
    </div>`;
  }).join('')}
  </div>`;
}

function renderSchedule(){
  if(!state.generated)return`<div class="empty">Generate a schedule from the Teams tab first.</div>`;
  const rounds=[...new Set(state.matches.map(m=>m.round))];
  return`
  <div class="sec"><h2>League schedule</h2><span class="badge amber">Round robin &mdash; ${rounds.length} rounds</span></div>
  ${rounds.map(r=>`
  <div style="margin-bottom:20px">
    <div style="font-size:11px;color:var(--text3);font-weight:600;margin-bottom:10px;
      text-transform:uppercase;letter-spacing:0.5px;display:flex;align-items:center;gap:6px">
      <i class="ti ti-circle-number-${r<=9?r:9}"></i> Round ${r}
    </div>
    ${state.matches.filter(m=>m.round===r).map(m=>{
      const t1=getTeam(m.t1),t2=getTeam(m.t2);
      const s1=parseInt(m.s1)||0,s2=parseInt(m.s2)||0;
      return`<div class="card" style="margin-bottom:8px;padding:12px 16px">
        <div style="display:flex;align-items:center;gap:8px">
          <div style="flex:1;font-size:13px;font-weight:500;${m.done&&s1>s2?'color:var(--green-light)':''}">${t1.name}</div>
          <div style="font-size:${m.done?'14px':'12px'};font-weight:${m.done?'600':'400'};
            color:${m.done?'var(--text)':'var(--text3)'}">
            ${m.done?`${m.s1} – ${m.s2}`:'vs'}
          </div>
          <div style="flex:1;text-align:right;font-size:13px;font-weight:500;${m.done&&s2>s1?'color:var(--green-light)':''}">${t2.name}</div>
          <span class="badge ${m.done?'green':'gray'}">${m.done?'Done':'Pending'}</span>
        </div>
      </div>`;
    }).join('')}
  </div>`).join('')}`;
}

function renderScores(){
  if(!state.generated)return`<div class="empty">Generate a schedule from the Teams tab first.</div>`;
  const pending=state.matches.filter(m=>!m.done);
  const done=state.matches.filter(m=>m.done);
  const leagueComplete=pending.length===0&&done.length>0;
  return`
  ${leagueComplete?`<div class="card" style="border-color:rgba(240,192,64,0.3);margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:10px">
      <i class="ti ti-trophy" style="font-size:22px;color:var(--gold)"></i>
      <div>
        <div style="font-weight:600;font-size:14px">League complete!</div>
        <div style="font-size:12px;color:var(--text2);margin-top:2px">Generate the knockout bracket from the Knockout tab.</div>
      </div>
      <button class="btn gold" style="margin-left:auto" onclick="showTab('knockout',document.querySelector('.nav-tabs button:nth-child(6)'))">
        <i class="ti ti-tournament"></i> Go to Knockout
      </button>
    </div>
  </div>`:''}
  <div class="sec"><h2>Enter scores</h2><span class="badge amber">${pending.length} pending</span></div>
  ${pending.length>0?`<div class="card" style="overflow-x:auto;margin-bottom:20px">
    <table><thead><tr>
      <th style="width:42px">Rnd</th><th style="width:28%">Team 1</th>
      <th style="width:100px;text-align:center">Score</th>
      <th style="width:28%">Team 2</th><th style="width:60px"></th>
    </tr></thead><tbody>
    ${pending.map(m=>{
      const t1=getTeam(m.t1),t2=getTeam(m.t2);
      return`<tr>
        <td><span class="badge gray">R${m.round}</span></td>
        <td title="${t1.name}">${t1.name}</td>
        <td style="text-align:center">
          <div style="display:flex;align-items:center;gap:4px;justify-content:center">
            <input class="score-input" id="s1_${m.id}" type="number" min="0" max="99" value="${m.s1}" placeholder="0">
            <span style="color:var(--text3)">–</span>
            <input class="score-input" id="s2_${m.id}" type="number" min="0" max="99" value="${m.s2}" placeholder="0">
          </div>
        </td>
        <td title="${t2.name}">${t2.name}</td>
        <td><button class="btn primary sm" onclick="saveLeagueScore(${m.id})">Save</button></td>
      </tr>`;
    }).join('')}</tbody></table></div>`:''}
  ${done.length>0?`
  <div class="sec"><h2>Results</h2><span class="badge green">${done.length} done</span></div>
  <div class="card"><table><thead><tr>
    <th style="width:42px">Rnd</th><th style="width:26%">Team 1</th>
    <th style="width:86px;text-align:center">Score</th>
    <th style="width:26%">Team 2</th><th>Winner</th><th style="width:46px"></th>
  </tr></thead><tbody>
  ${done.map(m=>{
    const t1=getTeam(m.t1),t2=getTeam(m.t2);
    const s1=parseInt(m.s1),s2=parseInt(m.s2);
    const winner=s1>s2?t1.name:s2>s1?t2.name:'Draw';
    return`<tr>
      <td><span class="badge gray">R${m.round}</span></td>
      <td class="${s1>s2?'win':'lose'}">${t1.name}</td>
      <td style="text-align:center;font-weight:600">${m.s1} – ${m.s2}</td>
      <td class="${s2>s1?'win':'lose'}">${t2.name}</td>
      <td><span class="badge green">${winner}</span></td>
      <td><button class="btn danger sm" onclick="undoLeagueScore(${m.id})" title="Undo">
        <i class="ti ti-arrow-back-up"></i></button></td>
    </tr>`;
  }).join('')}</tbody></table></div>`:''}`;
}

function renderStandings(){
  if(!state.generated)return`<div class="empty">Generate a schedule from the Teams tab first.</div>`;
  const rows=computeStandings();
  const posClass=i=>i===0?'sp1':i===1?'sp2':i===2?'sp3':'spn';
  const played=state.matches.filter(m=>m.done).length;
  const total=state.matches.length;
  const pct=total>0?Math.round(played/total*100):0;
  const q=knockoutQualifiers();
  return`
  <div class="sec"><h2>Standings</h2><span class="badge ${pct===100?'green':'amber'}">${pct}% complete</span></div>
  <div class="card">
    <table><thead><tr>
      <th style="width:36px">#</th><th>Team</th>
      <th style="width:110px;white-space:normal">Players</th>
      <th style="width:32px;text-align:center">MP</th>
      <th style="width:32px;text-align:center">W</th>
      <th style="width:32px;text-align:center">L</th>
      <th style="width:36px;text-align:center">Pts</th>
      <th style="width:44px;text-align:center">+/−</th>
      <th style="width:60px;text-align:center">KO</th>
    </tr></thead><tbody>
    ${rows.map((r,i)=>{
      const t=getTeam(r.id);
      const diff=r.sf-r.sa;
      const qualifies=i<q;
      return`<tr>
        <td><div class="sp ${posClass(i)}">${i+1}</div></td>
        <td style="font-weight:500">${t.name}</td>
        <td style="font-size:11px;color:var(--text2);white-space:normal">${t.p1}<br>${t.p2}</td>
        <td style="text-align:center;color:var(--text3)">${r.mp}</td>
        <td style="text-align:center;color:var(--green-light);font-weight:500">${r.w}</td>
        <td style="text-align:center;color:var(--text3)">${r.l}</td>
        <td style="text-align:center;font-weight:600">${r.pts}</td>
        <td style="text-align:center;color:${diff>0?'var(--green-light)':diff<0?'var(--red)':'var(--text3)'}">${diff>0?'+':''}${diff}</td>
        <td style="text-align:center">${qualifies?`<span class="badge green" style="font-size:10px">Q</span>`:`<span style="color:var(--text3);font-size:11px">—</span>`}</td>
      </tr>`;
    }).join('')}</tbody></table>
  </div>
  <div style="font-size:11px;color:var(--text3);margin-top:8px">Win=2pts · Draw=1pt · Loss=0pts · Q = qualifies for knockout (top ${q})</div>`;
}

function renderKnockout(){
  const leagueDone=state.generated&&state.matches.length>0&&state.matches.every(m=>m.done);
  const ko=state.knockout;

  if(!state.generated)return`<div class="empty">Complete the league stage first.</div>`;

  if(!leagueDone&&!ko.generated)return`
    <div class="empty">
      <i class="ti ti-lock" style="font-size:28px;color:var(--text3);display:block;margin-bottom:12px"></i>
      Complete all league matches to unlock the knockout stage.
      <br><br>
      <span style="font-size:12px;color:var(--text3)">${state.matches.filter(m=>m.done).length}/${state.matches.length} matches done</span>
    </div>`;

  if(!ko.generated)return`
    <div style="text-align:center;padding:40px 20px">
      <i class="ti ti-tournament" style="font-size:36px;color:var(--green-light);display:block;margin-bottom:16px"></i>
      <div style="font-size:15px;font-weight:600;margin-bottom:8px">League stage complete!</div>
      <div style="font-size:13px;color:var(--text2);margin-bottom:24px">
        Top ${knockoutQualifiers()} teams qualify based on standings.
      </div>
      <button class="btn primary" onclick="doGenerateKnockout()">
        <i class="ti ti-tournament"></i> Generate knockout bracket
      </button>
    </div>`;

  // Render bracket
  const rounds=ko.rounds;
  return`
  <div class="sec">
    <h2>Knockout bracket</h2>
    <span class="badge purple"><i class="ti ti-users"></i> Top ${ko.qualifierCount} teams</span>
  </div>
  <div class="bracket">
    <div class="bracket-grid">
      ${rounds.map((round,ri)=>`
      <div class="bracket-round">
        <div class="bracket-round-title">${round.name}</div>
        <div class="bracket-slots">
          ${round.matches.map((match,mi)=>{
            const t1=match.t1?getTeam(match.T1||match.t1):null;
            const t2=match.T2||match.t2?getTeam(match.T2||match.t2):null;
            const w=match.winner?getTeam(match.winner):null;
            return`
            <div class="bracket-match${match.done?' has-winner':''}">
              <div class="bracket-team ${match.done&&match.winner===match.t1?'winner':match.done?'loser':!match.t1?'tbd':''}">
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
                  ${t1?t1.name:'TBD'}
                </span>
                <span class="bracket-score" style="color:${match.done&&match.winner===match.t1?'var(--green-light)':'var(--text3)'}">
                  ${match.done?match.s1:''}
                </span>
              </div>
              <div class="bracket-team ${match.done&&match.winner===match.t2?'winner':match.done?'loser':!match.t2?'tbd':''}">
                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1">
                  ${t2?t2.name:'TBD'}
                </span>
                <span class="bracket-score" style="color:${match.done&&match.winner===match.t2?'var(--green-light)':'var(--text3)'}">
                  ${match.done?match.s2:''}
                </span>
              </div>
              ${match.t1&&match.t2&&!match.done?`
              <div style="padding:6px 8px;border-top:0.5px solid var(--border);display:flex;align-items:center;gap:4px;justify-content:center">
                <input class="score-input" id="ks1_${ri}_${mi}" type="number" min="0" max="99" placeholder="0" style="width:38px">
                <span style="color:var(--text3);font-size:11px">–</span>
                <input class="score-input" id="ks2_${ri}_${mi}" type="number" min="0" max="99" placeholder="0" style="width:38px">
                <button class="btn primary sm" style="padding:4px 8px;font-size:11px" onclick="saveKoScore(${ri},${mi})">Go</button>
              </div>`:''}
              ${match.done?`<div style="padding:4px 8px;text-align:center">
                <span style="font-size:10px;color:var(--green-light)">
                  <i class="ti ti-crown"></i> ${w?w.name:'TBD'}
                </span>
              </div>`:''}
            </div>`;
          }).join('')}
        </div>
      </div>
      ${ri<rounds.length-1?`<div style="width:20px;display:flex;flex-direction:column;justify-content:space-around;padding-top:40px">
        ${round.matches.map((_,i)=>i%2===0?`<div style="height:2px;background:var(--border2);margin:auto 0;width:100%"></div>`:'').join('')}
      </div>`:''}
      `).join('')}
    </div>
  </div>
  ${ko.rounds[ko.rounds.length-1]?.matches[0]?.done?`
  <div class="card" style="margin-top:20px;border-color:rgba(240,192,64,0.4);text-align:center;padding:24px">
    <i class="ti ti-trophy" style="font-size:36px;color:var(--gold);display:block;margin-bottom:12px"></i>
    <div style="font-size:18px;font-weight:700;color:var(--gold);margin-bottom:6px">
      ${(()=>{const f=ko.rounds[ko.rounds.length-1].matches[0];const w=getTeam(f.winner);return w?w.name:'Champions';})()}
    </div>
    <div style="font-size:13px;color:var(--text2)">Tournament Champions — Baddys Smash Tour</div>
  </div>`:''}`;
}

/* ──────────────── ACTIONS ──────────────── */

function render(){
  const mc=document.getElementById('tab-content');
  if(!mc)return;
  const t=state.tab;
  if(t==='teams')mc.innerHTML=renderTeams();
  else if(t==='poll')mc.innerHTML=renderPoll();
  else if(t==='schedule')mc.innerHTML=renderSchedule();
  else if(t==='scores')mc.innerHTML=renderScores();
  else if(t==='standings')mc.innerHTML=renderStandings();
  else if(t==='knockout')mc.innerHTML=renderKnockout();
}

function showTab(t,btn){
  state.tab=t;
  document.querySelectorAll('.nav-tabs button').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  render();
}

function doGenerateLeague(){generateLeague();saveState();render();}

function doGenerateKnockout(){generateKnockout();saveState();render();}

function removeTeam(id){
  if(!confirm('Remove this team? The schedule will be cleared.'))return;
  state.teams=state.teams.filter(t=>t.id!==id);
  if(state.generated){state.matches=[];state.generated=false;state.knockout={rounds:[],generated:false};}
  saveState();render();
}

function saveLeagueScore(id){
  const m=state.matches.find(x=>x.id===id);if(!m)return;
  m.s1=document.getElementById('s1_'+id)?.value||'0';
  m.s2=document.getElementById('s2_'+id)?.value||'0';
  m.done=true;saveState();render();
}

function undoLeagueScore(id){
  const m=state.matches.find(x=>x.id===id);if(!m)return;
  m.s1='';m.s2='';m.done=false;saveState();render();
}

function saveKoScore(ri,mi){
  const match=state.knockout.rounds[ri].matches[mi];
  const s1=parseInt(document.getElementById(`ks1_${ri}_${mi}`)?.value)||0;
  const s2=parseInt(document.getElementById(`ks2_${ri}_${mi}`)?.value)||0;
  if(s1===s2){alert('Knockout match cannot end in a draw. Please enter a clear winner.');return;}
  match.s1=s1;match.s2=s2;match.done=true;
  match.winner=s1>s2?match.t1:match.t2;
  propagateKnockout(ri,mi);
  saveState();render();
}

function castVote(pollId,optId){
  const poll=state.polls.find(p=>p.id===pollId);if(!poll)return;
  if(poll.votedFor){
    // change vote
    const prev=poll.options.find(o=>o.id===poll.votedFor);
    if(prev&&prev.votes>0)prev.votes--;
  }
  const opt=poll.options.find(o=>o.id===optId);if(!opt)return;
  opt.votes++;poll.votedFor=optId;
  saveState();render();
}

function deletePoll(id){
  if(!confirm('Delete this poll?'))return;
  state.polls=state.polls.filter(p=>p.id!==id);
  saveState();render();
}

function doReset(){
  if(!confirm('Reset all data? This cannot be undone.'))return;
  localStorage.removeItem(STORE_KEY);
  state=freshState();render();
}

/* ──────────────── MODALS ──────────────── */

function openAddTeam(){
  showModal(`
    <h3><i class="ti ti-users"></i> Add new team</h3>
    <div class="form-row"><label>Team name</label><input id="f-name" placeholder="e.g. Court Kings"/></div>
    <div class="form-row"><label>Player 1</label><input id="f-p1" placeholder="Full name"/></div>
    <div class="form-row"><label>Player 2</label><input id="f-p2" placeholder="Full name"/></div>
    <div class="form-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="addTeam()"><i class="ti ti-plus"></i> Add team</button>
    </div>`);
  setTimeout(()=>document.getElementById('f-name')?.focus(),50);
}

function addTeam(){
  const name=document.getElementById('f-name')?.value.trim();
  const p1=document.getElementById('f-p1')?.value.trim();
  const p2=document.getElementById('f-p2')?.value.trim();
  if(!name||!p1||!p2){alert('Please fill in all three fields.');return;}
  state.teams.push({id:state.nextTeamId++,name,p1,p2});
  if(state.generated){state.matches=[];state.generated=false;state.knockout={rounds:[],generated:false};}
  closeModal();saveState();render();
}

function generateGroupPolls(){
  const teams=[...state.teams];
  if(teams.length<4){alert('Need at least 4 teams to generate polls.');return;}
  if(state.polls.length>0){
    if(!confirm('This will replace all existing polls. Continue?'))return;
  }
  // Shuffle teams for random grouping
  for(let i=teams.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [teams[i],teams[j]]=[teams[j],teams[i]];
  }
  const groupSize=4;
  const newPolls=[];
  let pid=state.nextPollId;
  let oid=state.nextOptionId;
  for(let g=0;g<teams.length;g+=groupSize){
    const group=teams.slice(g,g+groupSize);
    if(group.length<2)break; // skip leftover group of 1
    const groupNum=Math.floor(g/groupSize)+1;
    newPolls.push({
      id:pid++,
      autoGroup:true,
      question:`Group ${groupNum} — Who will top this group?`,
      options:group.map(t=>({id:oid++,text:t.name,votes:0})),
      votedFor:null,
      createdAt:Date.now()
    });
  }
  state.polls=newPolls;
  state.nextPollId=pid;
  state.nextOptionId=oid;
  saveState();render();
}

function deleteAllPolls(){
  if(!confirm('Clear all polls?'))return;
  state.polls=[];saveState();render();
}

function showModal(html){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';overlay.id='modal-overlay';
  overlay.innerHTML=`<div class="modal" onclick="event.stopPropagation()">${html}</div>`;
  overlay.addEventListener('click',closeModal);
  document.body.appendChild(overlay);
  document.addEventListener('keydown',escClose);
}
function escClose(e){if(e.key==='Escape')closeModal();}
function closeModal(){
  document.getElementById('modal-overlay')?.remove();
  document.removeEventListener('keydown',escClose);
}

render();
</script>
</body>
</html>
